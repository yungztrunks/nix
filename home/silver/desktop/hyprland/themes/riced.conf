# Riced theme – Catppuccin Mocha palette, vivid gradients, fast animations

general {
  col.active_border   = rgba(cba6f7ee) rgba(89b4faee) 45deg
  col.inactive_border = rgba(313244aa)
  gaps_in   = 4
  gaps_out  = 8
  border_size = 2
  layout = dwindle
}

decoration {
  rounding = 8
  active_opacity   = 1.0
  inactive_opacity = 0.9
  drop_shadow      = true
  shadow_range     = 10
  shadow_render_power = 2
  col.shadow = rgba(1e1e2eee)

  blur {
    enabled    = true
    size       = 5
    passes     = 3
    noise      = 0.02
    contrast   = 1.1
    brightness = 1.0
  }
}

animations {
  enabled = true
  bezier = ricedBezier, 0.05, 0.9, 0.1, 1.05
  animation = windows,     1, 6, ricedBezier
  animation = windowsOut,  1, 5, default, popin 80%
  animation = border,      1, 10, default
  animation = borderangle, 1, 8,  default
  animation = fade,        1, 6, default
  animation = workspaces,  1, 5, ricedBezier, slide
}
