# macOS-like theme – rounded corners, soft blue accent, heavy blur

general {
  col.active_border   = rgba(007affee) rgba(00d4ffee) 45deg
  col.inactive_border = rgba(a0a0a0aa)
  gaps_in   = 6
  gaps_out  = 12
  border_size = 2
  layout = dwindle
}

decoration {
  rounding = 12
  active_opacity   = 1.0
  inactive_opacity = 0.95
  drop_shadow      = true
  shadow_range     = 15
  shadow_render_power = 3
  col.shadow = rgba(1a1a1aee)

  blur {
    enabled    = true
    size       = 8
    passes     = 3
    noise      = 0.0117
    contrast   = 0.8916
    brightness = 0.8172
  }
}

animations {
  enabled = true
  bezier = macosSpring, 0.15, 1.0, 0.3, 1.0
  bezier = macosEase,   0.25, 0.1, 0.25, 1.0
  animation = windows,    1, 5, macosSpring, popin 85%
  animation = windowsOut, 1, 4, macosEase,   popin 85%
  animation = border,     1, 8, default
  animation = fade,       1, 5, macosEase
  animation = workspaces, 1, 6, macosSpring, slidevert
}
