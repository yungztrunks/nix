# Standard theme – clean, modern look with subtle borders and animations

general {
  col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgba(595959aa)
  gaps_in   = 5
  gaps_out  = 10
  border_size = 2
  layout = dwindle
}

decoration {
  rounding = 8
  active_opacity   = 1.0
  inactive_opacity = 0.95
  drop_shadow      = true
  shadow_range     = 8
  shadow_render_power = 2
  col.shadow = rgba(1a1a1aee)

  blur {
    enabled  = true
    size     = 4
    passes   = 2
    noise    = 0.01
    contrast = 0.9
    brightness = 0.8
  }
}

animations {
  enabled = true
  bezier = standardBezier, 0.05, 0.9, 0.1, 1.05
  animation = windows,    1, 7, standardBezier
  animation = windowsOut, 1, 7, default, popin 80%
  animation = border,     1, 10, default
  animation = fade,       1, 7, default
  animation = workspaces, 1, 6, default
}
